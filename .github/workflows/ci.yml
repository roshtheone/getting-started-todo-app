name: Node.js CI
    on: [push, pull_request]
    
    jobs:
      build:
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: ./client
        steps:
          - uses: actions/checkout@v4
          - name: Use Node.js
            uses: actions/setup-node@v4
            with:
              node-version: '20'
          - run: npm install
          - run: npm run build --if-present
    
